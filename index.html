<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Koder Sandboxed Map Engine</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 0px); 
            --grid-cols: 5;
            --grid-rows: 3;
        }
        body { 
            background: #121212; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: calc(10px + var(--safe-top)) 12px 15px 12px; 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; text-align: center; font-weight: 700; }
        
        .grid-menu { display: grid; gap: 6px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .modes-grid { grid-template-columns: repeat(3, 1fr); background: #222; padding: 4px; border-radius: 10px; }
        .size-grid { grid-template-columns: repeat(4, 1fr); }
        .io-grid { grid-template-columns: repeat(3, 1fr); }
        
        .palette-grid { grid-template-columns: repeat(3, 1fr); background: #1c1c1e; padding: 6px; border-radius: 10px; border: 1px solid #2c2c2e; display: grid; }
        .palette-grid button { font-size: 11px; padding: 8px 2px; text-transform: uppercase; margin: 2px; }
        
        button, .node-target { 
            touch-action: manipulation !important;
            -webkit-appearance: none !important;
            user-select: none !important;
            cursor: pointer;
        }
        
        button {
            background: #2c2c2e; color: white; border: none; padding: 12px 2px; 
            border-radius: 8px; font-weight: 700; font-size: 12px; transition: background 0.2s ease;
        }
        button.active { background: #00bcd4; color: #000; }
        
        button#brush-Combat-1.active { background: #ff453a; color: #fff; }
        button#brush-Combat-3.active { background: #ff453a; color: #fff; box-shadow: 0 0 8px #ff453a; }
        button#brush-Combat-5.active { background: #ff453a; color: #fff; }
        button#brush-Elite-1.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-3.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-5.active { background: #bf5af2; color: #fff; }
        button#brush-Mystery.active { background: #ffd60a; color: #000; }
        button#brush-Shop.active { background: #0a84ff; color: white; }
        button#brush-Boss.active { background: #ff375f; color: white; }
        button#brush-Empty.active { background: #48484a; color: #fff; border: 1px dashed #fff; }
        
        #map-outer-wrapper { 
            width: 100%; overflow: auto; border: 2px solid #2c2c2e; 
            border-radius: 12px; background: #000; -webkit-overflow-scrolling: touch; 
            margin-bottom: 10px; box-sizing: border-box;
        }
        #map-container { 
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), 140px);
            grid-template-rows: repeat(var(--grid-rows), 75px);
            gap: 25px 35px;
            padding: 25px;
            width: max-content;
            height: max-content;
        }
        
        .node-target { 
            width: 100%; height: 100%; text-align: center; border-radius: 10px; 
            font-weight: 700; z-index: 2; box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            border: 2px solid transparent; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; padding: 0; margin: 0; background: #2c2c2e;
            position: relative; pointer-events: auto !important;
        }
        .node-target span { pointer-events: none !important; user-select: none !important; }
        .node-main { font-size: 11px; line-height: 1.2; }
        .node-sub { font-size: 9px; opacity: 0.75; margin-top: 1px; }

        .node-target.Empty { background: #2c2c2e; color: #8e8e93; border: 2px dashed #48484a; }
        .node-target.Combat { background: #ff453a; color: white; }
        .node-target.Elite { background: #bf5af2; color: white; }
        .node-target.Mystery { background: #ffd60a; color: black; }
        .node-target.Shop { background: #0a84ff; color: white; }
        .node-target.Boss { background: #ff375f; color: white; }
        
        .node-target.current { border-color: #30d158 !important; box-shadow: 0 0 12px #30d158 !important; }
        .node-target.selectable { border-color: #64d2ff !important; animation: pulse 1.5s infinite; }
        
        .path-indicator {
            position: absolute; font-size: 10px; color: #48484a; background: rgba(0,0,0,0.6);
            padding: 1px 4px; border-radius: 4px; border: 1px solid #2c2c2e;
            bottom: -15px; left: 50%; transform: translateX(-50%); z-index: 3;
            pointer-events: none; white-space: nowrap; font-weight: normal;
        }
        .node-target.current .path-indicator { color: #64d2ff; border-color: #64d2ff; }

        textarea { 
            width: 100%; height: 75px; background: #1c1c1e; color: #64d2ff; 
            border: 1px solid #2c2c2e; border-radius: 8px; font-family: monospace; 
            padding: 8px; box-sizing: border-box; resize: none; font-size: 11px; 
            -webkit-appearance: none; 
        }
        #log { 
            background: #000; padding: 10px; border-radius: 8px; 
            font-family: monospace; height: 100px; overflow-y: auto; color: #30d158; 
            font-size: 11px; border: 1px solid #2c2c2e; box-sizing: border-box; margin-bottom: 10px;
        }
        
        h3 { font-size: 11px; margin: 10px 0 4px 0; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(100,210,255,0.6); } 70% { box-shadow: 0 0 0 10px rgba(100,210,255,0); } 100% { box-shadow: 0 0 0 0 rgba(100,210,255,0); } }
    </style>
</head>
<body>

    <h2>📱 Custom Deck Map Studio</h2>
    
    <!-- Control Tabs -->
    <div class="grid-menu modes-grid">
        <button id="btn-edit" class="active" onclick="setMode('edit')">✏️ Paint Blocks</button>
        <button id="btn-link" onclick="setMode('link')">🔗 Link Paths</button>
        <button id="btn-play" onclick="setMode('play')">🎮 Playtest</button>
    </div>

    <!-- Paint Palette Grid -->
    <div id="paint-palette" class="grid-menu palette-grid">
        <button id="brush-Combat-1" class="active" onclick="selectBrush('Combat', 1)">Combat Lvl 1</button>
        <button id="brush-Combat-3" onclick="selectBrush('Combat', 3)">Combat Lvl 3</button>
        <button id="brush-Combat-5" onclick="selectBrush('Combat', 5)">Combat Lvl 5</button>
        <button id="brush-Elite-1" onclick="selectBrush('Elite', 1)">Elite Lvl 1</button>
        <button id="brush-Elite-3" onclick="selectBrush('Elite', 3)">Elite Lvl 3</button>
        <button id="brush-Elite-5" onclick="selectBrush('Elite', 5)">Elite Lvl 5</button>
        <button id="brush-Mystery" onclick="selectBrush('Mystery', null)">Mystery</button>
        <button id="brush-Shop" onclick="selectBrush('Shop', null)">Shop</button>
        <button id="brush-Boss" onclick="selectBrush('Boss', null)">Boss</button>
        <button id="brush-Empty" onclick="selectBrush('Empty', null)">Empty</button>
    </div>

    <!-- Dynamic Interactive Map View -->
    <div id="map-outer-wrapper">
        <div id="map-container"></div>
    </div>

    <!-- Console Logging Window -->
    <h3>System Console Logs</h3>
    <div id="log">Engine fully loaded. Select a painting mode above to start sculpting your grid layout.</div>

    <!-- Live Data JSON Output Window -->
    <h3>Map Schema Output (JSON)</h3>
    <textarea id="json-output" readonly placeholder="Interactive JSON generation schema will render inside here..."></textarea>

<script>
        // System Engine State Data Configuration
        let currentMode = 'edit';
        let currentBrush = { type: 'Combat', level: 1 };
        const gridCols = 5;
        const gridRows = 3;
        
        // Setup structural memory matrix map
        let mapData = [];
        for (let r = 0; r < gridRows; r++) {
            let rowArray = [];
            for (let c = 0; c < gridCols; c++) {
                rowArray.push({
                    id: `node-${r}-${c}`,
                    row: r,
                    col: c,
                    type: 'Empty',
                    level: null,
                    links: []
                });
            }
            mapData.push(rowArray);
        }

        // Initialize Core Structural Elements
        const mapContainer = document.getElementById('map-container');
        document.documentElement.style.setProperty('--grid-cols', gridCols);
        document.documentElement.style.setProperty('--grid-rows', gridRows);

        function logMessage(msg) {
            const logBox = document.getElementById('log');
            logBox.innerHTML += `<br>> ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.modes-grid button').forEach(b => b.classList.remove('active'));
            
            const modeBtn = document.getElementById(`btn-${mode}`);
            if (modeBtn) modeBtn.classList.add('active');
            
            const palette = document.getElementById('paint-palette');
            if (mode === 'edit') {
                palette.style.display = 'grid';
            } else {
                palette.style.display = 'none';
            }
            logMessage(`Switched mode profile over to: ${mode.toUpperCase()}`);
            renderMapGrid();
        }

        function selectBrush(type, level) {
            currentBrush = { type, level };
            document.querySelectorAll('.palette-grid button').forEach(b => b.classList.remove('active'));
            
            let targetId = `brush-${type}`;
            if(level) targetId += `-${level}`;
            
            const activeBtn = document.getElementById(targetId);
            if(activeBtn) activeBtn.classList.add('active');
            logMessage(`Active tool updated to: ${type} ${level ? '(Lvl ' + level + ')' : ''}`);
        }

        // Handle structural block interactions
        function handleNodeInteraction(row, col) {
            let targetNode = mapData[row][col];
            
            if (currentMode === 'edit') {
                targetNode.type = currentBrush.type;
                targetNode.level = currentBrush.level;
                logMessage(`Painted Node [${row},${col}] as ${targetNode.type}`);
            } 
            else if (currentMode === 'link') {
                logMessage(`Link logic requested for Node [${row},${col}]`);
            } 
            else if (currentMode === 'playtest') {
                logMessage(`Playtesting interaction structural trace at Node [${row},${col}]`);
            }
            
            renderMapGrid();
            updateJSONDisplay();
        }

        function updateJSONDisplay() {
            document.getElementById('json-output').value = JSON.stringify(mapData, null, 2);
        }

        // UI Builder Rendering Logic Pipeline
        function renderMapGrid() {
            mapContainer.innerHTML = '';
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const node = mapData[r][c];
                    const element = document.createElement('div');
                    element.className = `node-target ${node.type}`;
                    element.id = node.id;
                    
                    let innerContent = `<div class="node-main">${node.type}</div>`;
                    if(node.level) {
                        innerContent += `<div class="node-sub">LVL ${node.level}</div>`;
                    }
                    element.innerHTML = innerContent;
                    
                    // Unified Touch + Click Event Hook Integration
                    element.addEventListener('click', (e) => {
                        e.preventDefault();
                        handleNodeInteraction(r, c);
                    });
                    
                    mapContainer.appendChild(element);
                }
            }
        }

        // Run Initial Build Configuration Setup
        renderMapGrid();
        updateJSONDisplay();
    </script>
</body>
</html>
