<html lang="en" style="--grid-cols: 5; --grid-rows: 3;"><head><script src="/_sdk/telemetry_sdk.js"></script>

    <title>Koder Sandboxed Map Engine</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 0px); 
            --grid-cols: 5;
            --grid-rows: 3;
        }
        body { 
            background: #121212; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: calc(10px + var(--safe-top)) 12px 15px 12px; 
            -webkit-tap-highlight-color: transparent; 
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; text-align: center; font-weight: 700; }
        
        .grid-menu { display: grid; gap: 6px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .modes-grid { grid-template-columns: repeat(3, 1fr); background: #222; padding: 4px; border-radius: 10px; }
        .size-grid { grid-template-columns: repeat(4, 1fr); }
        .io-grid { grid-template-columns: repeat(3, 1fr); }
        
        .palette-grid { grid-template-columns: repeat(3, 1fr); background: #1c1c1e; padding: 6px; border-radius: 10px; border: 1px solid #2c2c2e; display: grid; }
        .palette-grid button { font-size: 11px; padding: 8px 2px; text-transform: uppercase; }
        
        button, .node-target { 
            touch-action: manipulation !important;
            -webkit-appearance: none !important;
            user-select: none !important;
        }
        
        button {
            background: #2c2c2e; color: white; border: none; padding: 12px 2px; 
            border-radius: 8px; font-weight: 700; font-size: 12px; 
        }
        button.active { background: #00bcd4; color: #000; }
        
        button#brush-Combat-1.active { background: #ff453a; color: #fff; }
        button#brush-Combat-3.active { background: #ff453a; color: #fff; box-shadow: 0 0 8px #ff453a; }
        button#brush-Combat-5.active { background: #ff453a; color: #fff; }
        button#brush-Elite-1.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-3.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-5.active { background: #bf5af2; color: #fff; }
        button#brush-Mystery.active { background: #ffd60a; color: #000; }
        button#brush-Shop.active { background: #0a84ff; color: white; }
        button#brush-Boss.active { background: #ff375f; color: white; }
        button#brush-Empty.active { background: #48484a; color: #fff; border: 1px dashed #fff; }
        
        #map-outer-wrapper { 
            width: 100%; overflow: auto; border: 2px solid #2c2c2e; 
            border-radius: 12px; background: #000; -webkit-overflow-scrolling: touch; 
            margin-bottom: 10px; box-sizing: border-box;
        }
        #map-container { 
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), 140px);
            grid-template-rows: repeat(var(--grid-rows), 75px);
            gap: 25px 35px;
            padding: 25px;
            width: max-content;
            height: max-content;
        }
        
        .node-target { 
            width: 100%; height: 100%; text-align: center; border-radius: 10px; 
            font-weight: 700; z-index: 2; box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            border: 2px solid transparent; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; padding: 0; margin: 0; background: #2c2c2e;
            position: relative; pointer-events: auto !important;
        }
        .node-target span { pointer-events: none !important; user-select: none !important; }
        .node-main { font-size: 11px; line-height: 1.2; }
        .node-sub { font-size: 9px; opacity: 0.75; margin-top: 1px; }

        .node-target.Empty { background: #2c2c2e; color: #8e8e93; border: 2px dashed #48484a; }
        .node-target.Combat { background: #ff453a; color: white; }
        .node-target.Elite { background: #bf5af2; color: white; }
        .node-target.Mystery { background: #ffd60a; color: black; }
        .node-target.Shop { background: #0a84ff; color: white; }
        .node-target.Boss { background: #ff375f; color: white; }
        
        .node-target.current { border-color: #30d158 !important; box-shadow: 0 0 12px #30d158 !important; }
        .node-target.selectable { border-color: #64d2ff !important; animation: pulse 1.5s infinite; }
        
        .path-indicator {
            position: absolute; font-size: 10px; color: #48484a; background: rgba(0,0,0,0.6);
            padding: 1px 4px; border-radius: 4px; border: 1px solid #2c2c2e;
            bottom: -15px; left: 50%; transform: translateX(-50%); z-index: 3;
            pointer-events: none; white-space: nowrap; font-weight: normal;
        }
        .node-target.current .path-indicator { color: #64d2ff; border-color: #64d2ff; }

        textarea { 
            width: 100%; height: 75px; background: #1c1c1e; color: #64d2ff; 
            border: 1px solid #2c2c2e; border-radius: 8px; font-family: monospace; 
            padding: 8px; box-sizing: border-box; resize: none; font-size: 11px; 
            -webkit-appearance: none; 
        }
        #log { 
            background: #000; padding: 10px; border-radius: 8px; 
            font-family: monospace; height: 100px; overflow-y: auto; color: #30d158; 
            font-size: 11px; border: 1px solid #2c2c2e; box-sizing: border-box; margin-bottom: 10px;
        }
        .deck-editor-card { background: #1c1c1e; border: 1px solid #2c2c2e; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .deck-select-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .deck-select-row select { flex: 1; background: #2c2c2e; color: #fff; border: 1px solid #48484a; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .deck-editor-card textarea { height: 110px; color: #fff; background: #000; }
        
        h3 { font-size: 11px; margin: 10px 0 4px 0; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(100,210,255,0.6); } 70% { box-shadow: 0 0 0 10px rgba(100,210,255,0); } 100% { box-shadow: 0 0 0 0 rgba(100,210,255,0); } }
    </style>

            <button onclick="saveTextareaToDeck()" style="background: rgb(48, 209, 88); color: rgb(0, 0, 0); padding: 0px 15px; font-weight: 700; font-size: 12px;" data-html-import-id="html-import-88" data-template-id="button-69" class="canva-button">💾 Apply</button>
        </div>
        <textarea id="deck-input-box" data-html-import-id="html-import-89" data-template-id="textarea-70" class="canva-input" style="background: rgb(0, 0, 0); color: rgb(255, 255, 255); font-family: monospace; font-size: 11px;"></textarea>
    </div>

    <h3 data-html-import-id="html-import-90" data-template-id="h3-71" class="canva-text" style="color: rgb(142, 142, 147); font-size: 11px;">📜 LOG CONSOLE</h3>
    <div id="log" data-html-import-id="html-import-91" data-template-id="div-72" class="canva-container" style="background: rgb(0, 0, 0); color: rgb(48, 209, 88); font-family: monospace; font-size: 11px;">&gt; Listening directly to touch coordinates via Global Bubble Interceptor.</div>

    <h3 data-html-import-id="html-import-92" data-template-id="h3-73" class="canva-text" style="color: rgb(142, 142, 147); font-size: 11px;">🗺️ DATA INTERCHANGE NODE</h3>
    <textarea id="json-io-box" placeholder="Tap Save to extract data text structure..." data-html-import-id="html-import-93" data-template-id="textarea-74" class="canva-input" style="background: rgb(28, 28, 30); color: rgb(100, 210, 255); font-family: monospace; font-size: 11px;"></textarea>

    <script data-html-import-id="html-import-94">
        const NODE_TYPES = ['Empty', 'Combat', 'Elite', 'Mystery', 'Shop', 'Boss'];
        
        let ENEMY_TIERS = {
            Combat: {
                1: ["Green Slime", "Blue Louse", "Wandering Cultist"],
                2: ["Jaw Worm", "Fungi Beast Duo", "Red Mask Bandit"],
                3: ["Sentry Sphere", "Constrictor Viper", "Fire Slime Herd"],
                4: ["Quartz Golem", "Cavern Parasite", "Shadow Stalker"],
                5: ["Plasma Arch-Mage", "Corrupted Hatchling", "Ironclad Automaton"]
            },
            Elite: {
                1: ["Gremlin Nob", "Lagavulin Sentinal"],
                2: ["Triple Sentries", "Book of Stabbing"],
                3: ["Giant Head Nemesis", "Reptomancer Dagger"],
                4: ["Transient Ghost Weaver", "Magma Wyvern Duo"],
                5: ["Void Champion Phantom", "Awakened Spawn"]
            },
            Boss: ["The Awakened One", "Donu & Deca", "Time Eater", "Corrupted Heart"]
        };

        const RANDOM_POOLS = {
            Mystery: ["💎 Found Golden Chest!", "🎭 Shifty Clown Jester", "🍎 Foraged Wild Berries", "💨 Spike Wall Trap!"],
            Shop: ["💳 Cleanse Curse Shop", "🧪 Ancient Strength Potion", "💍 Rare Merchant Relic"]
        };

        let currentMode = 'edit', linkSourceNodeId = null, playerCurrentNodeId = null;
        let activeBrushType = 'Combat', activeBrushLevel = 1;
        let totalCols = 5, totalRows = 3;
        let mapData = {};

        function initMapStructure() {
            mapData = {};
            buildMatrixData();
            mapData['n_0_1'].type = 'Combat';
            syncDisplayGrid();
            mountGlobalTouchInterceptor();
        }

        function buildMatrixData() {
            for (let c = 0; c < 30; c++) {
                for (let r = 0; r < 20; r++) {
                    const id = `n_${c}_${r}`;
                    if (!mapData[id]) {
                        mapData[id] = { id: id, col: c, row: r, type: 'Empty', level: 1, connections: [] };
                    }
                }
            }
        }
        function changeDimensions(type, Delta) {
            if (type === 'col') {
                if (totalCols + Delta < 2 || totalCols + Delta > 30) return;
                totalCols += Delta;
            } else {
                if (totalRows + Delta < 1 || totalRows + Delta > 20) return;
                totalRows += Delta;
            }
            
            Object.values(mapData).forEach(node => {
                if (node.col >= totalCols || node.row >= totalRows) {
                    node.type = 'Empty';
                    node.connections = [];
                }
                node.connections = node.connections.filter(targetId => {
                    const t = mapData[targetId];
                    return t && t.col < totalCols && t.row < totalRows;
                });
            });

            if (playerCurrentNodeId) {
                const p = mapData[playerCurrentNodeId];
                if (p.col >= totalCols || p.row >= totalRows) playerCurrentNodeId = null;
            }

            syncDisplayGrid();
            log(`Dimensions changed: ${totalCols}x${totalRows}`);
        }

        function syncDisplayGrid() {
            document.documentElement.style.setProperty('--grid-cols', totalCols);
            document.documentElement.style.setProperty('--grid-rows', totalRows);
            
            const container = document.getElementById('map-container');
            container.innerHTML = ''; 

            for (let r = 0; r < totalRows; r++) {
                for (let c = 0; c < totalCols; c++) {
                    const id = `n_${c}_${r}`;
                    const node = mapData[id];
                    
                    const div = document.createElement('div');
                    div.id = id;
                    div.className = `node-target ${node.type}`;
                    div.style.gridColumn = c + 1;
                    div.style.gridRow = r + 1;
                    div.setAttribute('data-node-id', id);
                    
                    let mainText = node.type === 'Empty' ? '➕' : node.type;
                    let subText = (node.type === 'Combat' || node.type === 'Elite') ? `Lv. ${node.level}` : "";
                    
                    let pathText = "";
                    if (node.connections.length > 0) {
                        const legiblePaths = node.connections.map(targetId => {
                            const t = mapData[targetId];
                            return t ? `(${t.col + 1},${t.row + 1})` : '';
                        }).join(' ');
                        pathText = `<span class="path-indicator">➡️ ${legiblePaths}</span>`;
                    }

                    div.innerHTML = `<span class="node-main">${mainText}</span><span class="node-sub">${subText}</span>${pathText}`;

                    if (currentMode === 'play') {
                        if (playerCurrentNodeId === id) div.classList.add('current');
                        else if (isNodeSelectable(id)) div.classList.add('selectable');
                    }
                    container.appendChild(div);
                }
            }
        }

        function mountGlobalTouchInterceptor() {
            const container = document.getElementById('map-container');
            
            // Bypasses Koder framework preview blocks via dynamic bubble processing
            container.addEventListener('click', function(e) {
                let targetNode = e.target;
                while (targetNode && targetNode !== container) {
                    if (targetNode.hasAttribute('data-node-id')) {
                        const nodeId = targetNode.getAttribute('data-node-id');
                        handleNodeClick(nodeId);
                        break;
                    }
                    targetNode = targetNode.parentNode;
                }
            });
        }
        function handleNodeClick(id) {
            const node = mapData[id];
            if (!node) return;

            if (currentMode === 'edit') {
                node.type = activeBrushType;
                node.level = activeBrushLevel;
                if (node.type === 'Empty') {
                    node.connections = [];
                    Object.values(mapData).forEach(n => { n.connections = n.connections.filter(c => c !== id); });
                }
                log(`Painted cell matrix point: (${node.col + 1}, ${node.row + 1})`);
                syncDisplayGrid();
            } 
            else if (currentMode === 'link') {
                if (node.type === 'Empty') return log("Can't link empty slots.");
                if (!linkSourceNodeId) {
                    linkSourceNodeId = id;
                    const el = document.getElementById(id);
                    if (el) el.style.borderColor = '#ff9500';
                } else {
                    if (linkSourceNodeId === id) { linkSourceNodeId = null; syncDisplayGrid(); return; }
                    const sourceNode = mapData[linkSourceNodeId];
                    if (Math.abs(node.col - sourceNode.col) <= 1 && Math.abs(node.row - sourceNode.row) <= 1) {
                        if (!sourceNode.connections.includes(id)) sourceNode.connections.push(id);
                        else sourceNode.connections = sourceNode.connections.filter(c => c !== id);
                    } else { log("Out of bounds. Links must be 8-directional adjacent cells."); }
                    linkSourceNodeId = null; syncDisplayGrid();
                }
            } 
            else if (currentMode === 'play') {
                if (node.type === 'Empty') return;
                if (playerCurrentNodeId === null) {
                    if (node.col === 0) executeNodeTrigger(node);
                    else log("Start journey at a Column 1 node.");
                } else { if (isNodeSelectable(id)) executeNodeTrigger(node); }
            }
        }

        function executeNodeTrigger(node) {
            playerCurrentNodeId = node.id;
            syncDisplayGrid();
            
            if (node.type === 'Combat' || node.type === 'Elite') {
                const activePool = ENEMY_TIERS[node.type][node.level];
                log(`[⚔️ col ${node.col+1} - Tier ${node.level}] Encounter: <strong>${activePool[Math.floor(Math.random() * activePool.length)]}</strong>`);
            } else if (node.type === 'Boss') {
                log(`[💀 BOSS ENCOUNTER] Rolled: <strong>${ENEMY_TIERS.Boss[Math.floor(Math.random() * ENEMY_TIERS.Boss.length)]}</strong>`);
            } else {
                const genericPool = RANDOM_POOLS[node.type];
                if (genericPool) {
                    log(`[🎰 col ${node.col+1}] Event: <strong>${genericPool[Math.floor(Math.random() * genericPool.length)]}</strong>`);
                } else { log(`[Entered col ${node.col+1}]`); }
            }
        }

        function isNodeSelectable(targetId) {
            if (playerCurrentNodeId === null) return mapData[targetId].col === 0;
            return mapData[playerCurrentNodeId].connections.includes(targetId);
        }

        function selectBrush(type, level) {
            activeBrushType = type; activeBrushLevel = level;
            document.querySelectorAll('.palette-grid button').forEach(b => b.classList.remove('active'));
            let btnId = `brush-${type}`;
            if (type === 'Combat' || type === 'Elite') btnId += `-${level}`;
            const targetBtn = document.getElementById(btnId);
            if (targetBtn) targetBtn.classList.add('active');
            log(`Tool: [${type} ${type==='Combat'||type==='Elite'? 'Lv.'+level : ''}]`);
        }

        function setMode(mode) {
            currentMode = mode; linkSourceNodeId = null;
            document.querySelectorAll('.modes-grid button').forEach(b => b.classList.remove('active'));
            const targetModeBtn = document.getElementById(`btn-${mode}`);
            if (targetModeBtn) targetModeBtn.classList.add('active');
            
            const palette = document.getElementById('paint-palette');
            if (palette) palette.style.display = (mode === 'edit') ? 'grid' : 'none';
            
            log(`Mode changed: ${mode.toUpperCase()}`);
            syncDisplayGrid(); 
        }

        function loadDeckToTextarea() {
            const selectedKey = document.getElementById('deck-selector').value;
            const textfield = document.getElementById('deck-input-box');
            if (selectedKey === 'Boss') { textfield.value = ENEMY_TIERS.Boss.join(', '); } 
            else { const parts = selectedKey.split('_'); textfield.value = ENEMY_TIERS[parts][parts].join(', '); }
        }

        function saveTextareaToDeck() {
            const selectedKey = document.getElementById('deck-selector').value;
            const items = document.getElementById('deck-input-box').value.split(',').map(s => s.trim()).filter(s => s.length > 0);
            if (items.length === 0) return log("❌ Error: List pool empty.");
            if (selectedKey === 'Boss') { ENEMY_TIERS.Boss = items; } 
            else { const parts = selectedKey.split('_'); ENEMY_TIERS[parts][parts] = items; }
            log(`✏️ Saved updates for: [${selectedKey}]!`);
        }

        function resetPlayer() { playerCurrentNodeId = null; log("Progression reset."); syncDisplayGrid(); }
        function exportMapJson() { document.getElementById('json-io-box').value = JSON.stringify({ totalCols, totalRows, ENEMY_TIERS, mapData }, null, 2); log("🎉 Saved!"); }
        
        function importMapJson() {
            const textData = document.getElementById('json-io-box').value.trim(); if (!textData) return;
            try {
                const parsed = JSON.parse(textData);
                if (parsed.mapData) {
                    totalCols = parsed.totalCols || 5; totalRows = parsed.totalRows || 3; mapData = parsed.mapData;
                    if (parsed.ENEMY_TIERS) ENEMY_TIERS = parsed.ENEMY_TIERS;
                    playerCurrentNodeId = null; setMode('edit'); loadDeckToTextarea(); syncDisplayGrid(); log("📂 Loaded!");
                }
            } catch (e) { log(`❌ Import Error.`); }
        }

        initMapStructure();
        loadDeckToTextarea();
    </script>
