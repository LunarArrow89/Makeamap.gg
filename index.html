<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sandboxed Map Engine</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 0px); 
            --grid-cols: 5;
            --grid-rows: 3;
        }
        body { 
            background: #1c1c1e; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: calc(10px + var(--safe-top)) 12px 15px 12px; 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; text-align: center; font-weight: 700; color: #fff; }
        
        .grid-menu { display: grid; gap: 6px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .modes-grid { grid-template-columns: repeat(3, 1fr); background: #2c2c2e; padding: 4px; border-radius: 10px; }
        .size-control-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        
        .palette-grid { grid-template-columns: repeat(3, 1fr); background: #2c2c2e; padding: 6px; border-radius: 10px; border: 1px solid #3a3a3c; display: grid; }
        .palette-grid button { font-size: 11px; padding: 8px 2px; text-transform: uppercase; margin: 2px; }
        
        button, .node-target { 
            touch-action: manipulation !important;
            -webkit-appearance: none !important;
            user-select: none !important;
            cursor: pointer;
        }
        
        button {
            background: #3a3a3c; color: #fff; border: none; padding: 12px 2px; 
            border-radius: 8px; font-weight: 700; font-size: 12px; transition: background 0.2s ease;
        }
        .modes-grid button { background: #3a3a3c; color: #fff; }
        button.active { background: #00bcd4; color: #000; }
        
        button.size-btn { background: #0a84ff; color: #fff; padding: 10px 2px; font-size: 11px; }
        button.size-btn:active { background: #0056b3; }
        
        button#brush-Combat-1.active { background: #ff453a; color: #fff; }
        button#brush-Combat-2.active { background: #ff453a; color: #fff; }
        button#brush-Combat-3.active { background: #ff453a; color: #fff; box-shadow: 0 0 8px #ff453a; }
        button#brush-Combat-4.active { background: #ff453a; color: #fff; }
        button#brush-Combat-5.active { background: #ff453a; color: #fff; }
        button#brush-Elite-1.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-2.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-3.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-4.active { background: #bf5af2; color: #fff; }
        button#brush-Elite-5.active { background: #bf5af2; color: #fff; }
        button#brush-Mystery.active { background: #ffd60a; color: #000; }
        button#brush-Shop.active { background: #0a84ff; color: white; }
        button#brush-Boss.active { background: #ff375f; color: white; }
        button#brush-Empty.active { background: #48484a; color: #fff; border: 1px dashed #fff; }
        
#map-outer-wrapper{

    width:100%;
    overflow:auto;
    touch-action:pan-x pan-y;
    -webkit-overflow-scrolling:touch;

} border: 2px solid #3a3a3c; 
            border-radius: 12px; background: #121212; -webkit-overflow-scrolling: touch; 
            margin-bottom: 10px; box-sizing: border-box;
        }
        #map-container { 
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), minmax(100px,130px));
            grid-template-rows: repeat(var(--grid-rows), minmax(75px,100px));
            gap: 25px 35px;
            padding: 25px;
            width: max-content;
            height: max-content;
            background-image: radial-gradient(#3a3a3c 2px, transparent 2px);
            background-size: 20px 20px;
        }
        
        .node-target touch-action: manipulation;
min-height:75px; { 
            width: 100%; height: 100%; text-align: center; border-radius: 10px; 
            font-weight: 700; z-index: 2; box-shadow: 0 4px 8px rgba(0,0,0,0.4); 
            border: 2px solid transparent; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; padding: 2px; margin: 0; background: #2c2c2e;
            position: relative; pointer-events: auto !important;
        }
        .node-main { font-size: 11px; line-height: 1.2; text-transform: uppercase; }
        .node-sub { font-size: 9px; opacity: 0.75; margin-top: 1px; }
        .node-rolled { font-size: 15px; color: #ffd60a; margin-top: 2px; font-weight: normal; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 120px; }

        .node-target.Empty { background: #2c2c2e; color: #8e8e93; border: 2px dashed #48484a; box-shadow: none; }
        .node-target.Combat { background: #ff453a; color: white; }
        .node-target.Elite { background: #bf5af2; color: white; }
        .node-target.Mystery { background: #ffd60a; color: black; }
        .node-target.Shop { background: #0a84ff; color: white; }
        .node-target.Boss { background: #ff375f; color: white; }
        
        .deck-editor-card { background: #2c2c2e; border: 1px solid #3a3a3c; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .deck-select-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .deck-select-row select { flex: 1; background: #3a3a3c; color: #fff; border: 1px solid #48484a; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; }
        
        textarea { 
            width: 100%; height: 75px; background: #121212; color: #64d2ff; 
            border: 1px solid #3a3a3c; border-radius: 8px; font-family: monospace; 
            padding: 8px; box-sizing: border-box; resize: none; font-size: 11px; 
            -webkit-appearance: none; 
        }
        .deck-editor-card textarea { height: 90px; color: #fff; background: #121212; }
        #log { 
            background: #000; padding: 10px; border-radius: 8px; 
            font-family: monospace; height: 100px; overflow-y: auto; color: #30d158; 
            font-size: 11px; border: 1px solid #3a3a3c; box-sizing: border-box; margin-bottom: 10px;
        }
        
        h3 { font-size: 11px; margin: 10px 0 4px 0; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <h2>📱 Custom Deck Map Studio</h2>
    
    <!-- Control Tabs -->
    <div class="grid-menu modes-grid">
        <button id="btn-edit" class="active" onclick="setMode('edit')">✏️ Paint Blocks</button>
        <button id="btn-link" onclick="setMode('link')">🔗 Link Paths</button>
        <button id="btn-play" onclick="setMode('playtest')">🎮 Playtest</button>
    </div>

    <!-- Size Control Board Buttons -->
    <h3>📐 Canvas Structural Tuning</h3>
    <div class="grid-menu size-control-grid">
        <button class="size-btn" onclick="adjustGridSize('row', 1)">➕ Add Row</button>
        <button class="size-btn" onclick="adjustGridSize('row', -1)">➖ Remove Row</button>
        <button class="size-btn" onclick="adjustGridSize('col', 1)">➕ Add Column</button>
        <button class="size-btn" onclick="adjustGridSize('col', -1)">➖ Remove Column</button>
    </div>

    <!-- Paint Palette Grid -->
    <div id="paint-palette" class="grid-menu palette-grid">
        <button id="brush-Combat-1" class="active" onclick="selectBrush('Combat', 1)">C-Lvl 1</button>
        <button id="brush-Combat-2" onclick="selectBrush('Combat', 2)">C-Lvl 2</button>
        <button id="brush-Combat-3" onclick="selectBrush('Combat', 3)">C-Lvl 3</button>
        <button id="brush-Combat-4" onclick="selectBrush('Combat', 4)">C-Lvl 4</button>
        <button id="brush-Combat-5" onclick="selectBrush('Combat', 5)">C-Lvl 5</button>
        <button id="brush-Elite-1" onclick="selectBrush('Elite', 1)">E-Lvl 1</button>
        <button id="brush-Elite-2" onclick="selectBrush('Elite', 2)">E-Lvl 2</button>
        <button id="brush-Elite-3" onclick="selectBrush('Elite', 3)">E-Lvl 3</button>
        <button id="brush-Elite-4" onclick="selectBrush('Elite', 4)">E-Lvl 4</button>
        <button id="brush-Elite-5" onclick="selectBrush('Elite', 5)">E-Lvl 5</button>
        <button id="brush-Mystery" onclick="selectBrush('Mystery', null)">Mystery</button>
        <button id="brush-Shop" onclick="selectBrush('Shop', null)">Shop</button>
        <button id="brush-Boss" onclick="selectBrush('Boss', null)">Boss</button>
        <button id="brush-Empty" onclick="selectBrush('Empty', null)">Empty</button>
    </div>

    <!-- Dynamic Interactive Map View -->
    <!-- Dynamic Interactive Map View -->

<div style="display:flex; gap:10px; margin-bottom:10px;">

    <button onclick="saveProjectStateToStorage()">
        💾 Save
    </button>

    <button onclick="loadSavedProjectState(); renderMapGrid();">
        📂 Load
    </button>

</div>

<div id="map-outer-wrapper">
    <div id="map-container"></div>
</div>
    <div id="map-outer-wrapper">
        <div id="map-container"></div>
    </div>

    <!-- Dynamic Monster List Editor Panel -->
    <h3>📋 Monster Pool Database Editor</h3>
    <div class="deck-editor-card">
        <div class="deck-select-row">
            <select id="monster-tier-select" onchange="loadTierPool()">
                <option value="1">Tier Pool Level 1 (Low Danger)</option>
                <option value="2">Tier Pool Level 2</option>
                <option value="3">Tier Pool Level 3</option>
                <option value="4">Tier Pool Level 4</option>
                <option value="5">Tier Pool Level 5 (High Danger)</option>
            </select>
        </div>
        <textarea id="monster-raw-input" oninput="saveTierPool()" placeholder="Enter one monster name per line..."></textarea>
    </div>

    <!-- Console Logging Window -->
    <h3>System Console Logs</h3>
    <div id="log">Engine fully loaded. Select adjustments or tools above.</div>

    <!-- Live Data JSON Output Window -->
    <h3>Map Schema Output (JSON)</h3>
    <textarea id="json-output" readonly></textarea>
    <script>
        // System Engine State Data Configuration
        let currentMode = 'edit';
        let currentBrush = { type: 'Combat', level: 1 };
        let gridCols = 5;
        let gridRows = 3;
        const mapContainer = document.getElementById("map-container");

        // Centralized Tier Pool Configuration Fallbacks
        let defaultMonsterPools = {
            "1": "Slime\nGoblin Scout\nWild Rat\nBat Cluster",
            "2": "Orc Warrior\nZombie Fighter\nSkeleton Archer\nPoison Snake",
            "3": "Gargoyle\nFire Elemental\nIce Golem\nShadow Stalker",
            "4": "Wyvern\nChimera\nNecromancer\nDark Knight",
            "5": "Ancient Dragon\nBeholder\nLich Lord\nKraken Spawn"
        };
        
        let monsterPools = JSON.parse(localStorage.getItem('koder_monster_pools')) || defaultMonsterPools;
        let mapData = [];
        let currentSaveSlot = 1;

        // Load map structure history configuration if present
function loadSavedProjectState() {

    const savedMap = localStorage.getItem(`map_${currentSaveSlot}`);
    const savedRows = localStorage.getItem(`rows_${currentSaveSlot}`);
    const savedCols = localStorage.getItem(`cols_${currentSaveSlot}`);

    if(savedMap){

        gridRows = parseInt(savedRows);
        gridCols = parseInt(savedCols);

        mapData = JSON.parse(savedMap);

    }else{

        initializeMapMatrix();

    }

    syncCSSGridProperties();

}

            if (savedMap && savedRows && savedCols) {
                gridRows = parseInt(savedRows, 10);
                gridCols = parseInt(savedCols, 10);
                mapData = JSON.parse(savedMap);
                logMessage("💾 Loaded your saved map from local browser storage automatically.");
            } else {
                initializeMapMatrix();
            }
            syncCSSGridProperties();
        }

function saveProjectStateToStorage() {
    localStorage.setItem(`map_${currentSaveSlot}`, JSON.stringify(mapData));
    localStorage.setItem(`rows_${currentSaveSlot}`, gridRows);
    localStorage.setItem(`cols_${currentSaveSlot}`, gridCols);
    localStorage.setItem(`monsters_${currentSaveSlot}`, JSON.stringify(monsterPools));

    logMessage("💾 Map saved.");
}

        function initializeMapMatrix() {
            mapData = [];
            for (let r = 0; r < gridRows; r++) {
                let rowArray = [];
                for (let c = 0; c < gridCols; c++) {
                    rowArray.push(createNewNode(r, c));
                }
                mapData.push(rowArray);
            }
        }

        function createNewNode(r, c) {
            return {
                id: `node-${r}-${c}`,
                row: r,
                col: c,
                type: 'Empty',
                level: null,
                rolledEnemy: null,
                links: []
            };
        }

        function syncCSSGridProperties() {
            document.documentElement.style.setProperty('--grid-cols', gridCols);
            document.documentElement.style.setProperty('--grid-rows', gridRows);
        }

        // Fixed Grid Shifter Module: Seamless expansion/reduction tracking
        function adjustGridSize(dimension, change) {
            if (dimension === 'row') {
                const targetRows = gridRows + change;
                if (targetRows < 1) { logMessage("⚠️ Blocked: Map must retain at least 1 Row."); return; }
                
                if (change > 0) {
                    let newRowArray = [];
                    for(let c=0; c < gridCols; c++) {
                        newRowArray.push(createNewNode(gridRows, c));
                    }
                    mapData.push(newRowArray);
                } else {
                    mapData.pop();
                }
                gridRows = targetRows;
            } else if (dimension === 'col') {
                const targetCols = gridCols + change;
                if (targetCols < 1) { logMessage("⚠️ Blocked: Map must retain at least 1 Column."); return; }
                
                if (change > 0) {
                    for(let r=0; r < gridRows; r++) {
                        mapData[r].push(createNewNode(r, gridCols));
                    }
                } else {
                    for(let r=0; r < gridRows; r++) {
                        mapData[r].pop();
                    }
                }
                gridCols = targetCols;
            }
            
            syncCSSGridProperties();
            logMessage(`Grid dimensions updated to: ${gridRows} Rows x ${gridCols} Columns.`);
            
            saveProjectStateToStorage();
            renderMapGrid();
            updateJSONDisplay();
        }

        function logMessage(msg) {
            const logBox = document.getElementById('log');
            logBox.innerHTML += `<br>> ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function loadTierPool() {
            const currentTier = document.getElementById('monster-tier-select').value;
            document.getElementById('monster-raw-input').value = monsterPools[currentTier];
        }

        function saveTierPool() {
            const currentTier = document.getElementById('monster-tier-select').value;
            monsterPools[currentTier] = document.getElementById('monster-raw-input').value;
            saveProjectStateToStorage();
        }

        function getRandomMonster(level) {
            const tierKey = String(level || 1);
            const poolText = monsterPools[tierKey] || "";
            const monsterArray = poolText.split('\n').map(m => m.trim()).filter(m => m.length > 0);
            
            if (monsterArray.length === 0) return "Unknown Entity";
            const randomIndex = Math.floor(Math.random() * monsterArray.length);
            return monsterArray[randomIndex];
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.modes-grid button').forEach(b => b.classList.remove('active'));
            
            const modeBtn = document.getElementById(`btn-${mode}`);
            if (modeBtn) modeBtn.classList.add('active');
            
            const palette = document.getElementById('paint-palette');
            if (mode === 'edit') {
                palette.style.display = 'grid';
            } else {
                palette.style.display = 'none';
            }
            logMessage(`Switched mode profile over to: ${mode.toUpperCase()}`);
            renderMapGrid();
        }

        function selectBrush(type, level) {
            currentBrush = { type, level };
            document.querySelectorAll('.palette-grid button').forEach(b => b.classList.remove('active'));
            
            let targetId = `brush-${type}`;
            if(level) targetId += `-${level}`;
            
            const activeBtn = document.getElementById(targetId);
            if(activeBtn) activeBtn.classList.add('active');
            logMessage(`Active tool updated to: ${type} ${level ? '(Lvl ' + level + ')' : ''}`);
        }

        function handleNodeInteraction(row, col) {
            let targetNode = mapData[row][col];
            if (!targetNode) return;
            
            if (currentMode === 'edit') {
                targetNode.type = currentBrush.type;
                targetNode.level = currentBrush.level;
                targetNode.rolledEnemy = null;
                logMessage(`Painted Node [${row},${col}] as ${targetNode.type}`);
            } 
            else if (currentMode === 'link') {
                logMessage(`Link logic requested for Node [${row},${col}]`);
            } 
            else if (currentMode === 'playtest') {
                if (targetNode.type === 'Combat' || targetNode.type === 'Elite') {
                    const selectedEnemy = getRandomMonster(targetNode.level);
                    targetNode.rolledEnemy = selectedEnemy;
                    logMessage(`🎲 Rolled combat target at Node [${row},${col}]: **${selectedEnemy}** (Lvl ${targetNode.level || 1})`);
                } else {
                    logMessage(`Stepped onto ${targetNode.type} space at Node [${row},${col}]`);
                }
            }
            
            saveProjectStateToStorage();
            renderMapGrid();
            updateJSONDisplay();
        }

        function updateJSONDisplay() {
            document.getElementById('json-output').value = JSON.stringify(mapData, null, 2);
        }

        function renderMapGrid() {
            mapContainer.innerHTML = '';
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const node = mapData[r][c];
                    if (!node) continue;
                    
                    const element = document.createElement('div');
                    element.className = `node-target ${node.type}`;
                    element.id = node.id;
                    
                    let innerContent = `<div class="node-main">${node.type}</div>`;
                    if(node.level) {
                        innerContent += `<div class="node-sub">LVL ${node.level}</div>`;
                    }
                    if(node.rolledEnemy) {
                        innerContent += `<div class="node-rolled">👾 ${node.rolledEnemy}</div>`;
                    }
                    element.innerHTML = innerContent;
                    
                    // Fixed: Safe scoped loop indexes to guarantee clicks map to the accurate block
                    (function(row, col) {
element.addEventListener("click", () => {
    handleNodeInteraction(row, col);
});

element.addEventListener("touchstart", (e) => {
    e.preventDefault();
    handleNodeInteraction(row, col);
});
                        };
                    })(r, c);
                    
                    mapContainer.appendChild(element);
                }
            }
        }

        // Run Initial Build Configuration Setup
        loadSavedProjectState();
        loadTierPool();
        renderMapGrid();
        updateJSONDisplay();
    </script>
</body>
</html>
